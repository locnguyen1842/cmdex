name: Build & Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0) — used only for naming artifacts'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: cmdex-linux-amd64
          - os: macos-latest
            artifact: cmdex-darwin-universal
          - os: windows-latest
            artifact: cmdex-windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74

      - name: Package (tag release)
        if: startsWith(github.ref, 'refs/tags/')
        run: task ${{ runner.os == 'macOS' && 'package:universal' || 'package' }}

      - name: Build (dispatch / non-tag)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: task build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-${{ inputs.tag || 'untagged' }}
          path: |
            bin/
            build/windows/nsis/*.exe
          if-no-files-found: warn
