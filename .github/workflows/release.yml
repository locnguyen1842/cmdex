name: Build & Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0) — used only for naming artifacts'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: cmdex-linux-amd64
          - os: macos-latest
            artifact: cmdex-darwin-universal
          - os: windows-latest
            artifact: cmdex-windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Windows NSIS installer tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          $nsisPath = Get-ChildItem "C:\Program Files*\NSIS" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsisPath) {
            echo $nsisPath.FullName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74

      - name: Package (tag release)
        if: startsWith(github.ref, 'refs/tags/')
        run: task ${{ runner.os == 'macOS' && 'package:universal' || 'package' }}

      - name: Build (dispatch / non-tag)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: task build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-${{ inputs.tag || 'untagged' }}
          path: |
            bin/
            build/windows/nsis/*.exe
          if-no-files-found: warn

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Flatten artifact directories
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec mv {} release-assets/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false